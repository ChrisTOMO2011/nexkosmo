services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nexkosmo
      POSTGRES_USER: nexkosmo_owner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      NEXKOSMO_APP_PASSWORD: ${NEXKOSMO_APP_PASSWORD:?NEXKOSMO_APP_PASSWORD must be set in .env}
      NEXKOSMO_AUDIT_PASSWORD: ${NEXKOSMO_AUDIT_PASSWORD:?NEXKOSMO_AUDIT_PASSWORD must be set in .env}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/bootstrap_roles.sh:/docker-entrypoint-initdb.d/001_roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexkosmo_owner -d nexkosmo"]
      interval: 2s
      timeout: 3s
      retries: 30

  migrate:
    build: .
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  test:
    build: .
    env_file: .env
    environment:
      REQUIRE_POSTGRES: "1"
    command: ["pytest", "-q", "--disable-warnings", "--maxfail=1"]
    depends_on:
      migrate:
        condition: service_completed_successfully

  restore-test:
    build: .
    env_file: .env
    user: root
    command: ["bash", "scripts/backup_restore_rehearsal.sh"]
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
