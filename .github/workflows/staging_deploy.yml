name: STAGING DEPLOY PIPELINE

on:
  #push:
   # branches: [develop]

env:
  DEPLOY_HOST: '144.6.185.233' 
  DEPLOY_USER: 'nexkosmo'                
  DEPLOY_PATH: '/opt/nexkosmo_staging/'
  FRONTEND_DIR: '/opt/nexkosmo_staging/'
  BACKEND_DIR: '/opt/nexkosmo_staging/'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit pip-audit

      - name: Run Ruff (Linting & Formatting)
        run: |
          ruff check .
          ruff format --check .

      - name: Run Mypy (Type Check)
        run: mypy .

      - name: Run Bandit (Security Check)
        run: bandit -r . -x ./tests

      - name: Audit Dependencies
        run: pip-audit
  test:
    name: Run All Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: success() 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 
        uses: actions/setup-python@v5
        with:
              python-version: 3.14

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: run services
        run: |
          docker compose up -d postgres
          docker compose run --rm migrate
          docker compose run --rm test
          docker compose up api
      - name: Stop services
        if: always()
        run: docker compose down -v

#      - name: Run Tests with Pytest
#        run: |
#          pytest --cov=. --cov-report=xml
        
  deploy:
    runs-on: ubuntu-latest
    needs: test 
    if: success() 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH and deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            set -e 
            
            echo "Changing to deploy directory."
            sudo su && cd ${{ env.DEPLOY_PATH }}
            
            echo "Pulling latest code."
            git pull origin develop
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            docker compose down -v
            docker compose up --build --no-cache
            docker compose up -d postgres
            docker compose run --rm migrate
            docker compose run --rm test
            docker compose up -d api
            
            echo "Deployment completed successfully!"
